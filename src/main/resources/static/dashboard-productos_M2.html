<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .navbar { background-color: #0d6efd !important; } /* Azul corporativo de Badena */
        .card-producto { transition: transform 0.2s; border: none; }
        .card-producto:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark sticky-top mb-4 shadow">
    <div class="container position-relative">
        <a class="navbar-brand fw-bold" href="#">Badena Catálogo</a>
        
        <div class="d-none d-md-block position-absolute start-50 translate-middle-x">
            <span class="navbar-text text-white fw-bold fs-4 text-uppercase" id="nombreTiendaNav" style="letter-spacing: 1.5px;"></span>
        </div>

        <div class="ms-auto d-flex align-items-center">
            <span class="text-white me-3 d-none d-sm-inline" id="userGreeting"></span>
            <a href="perfil.html" class="btn btn-outline-light btn-sm rounded-pill px-3 me-2">Mi Perfil</a>
            <button onclick="cerrarSesion()" class="btn btn-danger btn-sm rounded-pill"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Mis Productos</h2>
            <p class="text-muted">Gestiona el inventario de tu tienda</p>
        </div>
        <button class="btn btn-primary rounded-pill px-4 fw-bold" onclick="abrirModalCrear()">
            <i class="bi bi-plus-lg me-2"></i>Nuevo Producto
        </button>
    </div>

    <div class="row g-4" id="contenedorProductos">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Cargando catálogo...</p>
        </div>
    </div>
</div>

<script>
    const usuario = JSON.parse(localStorage.getItem('usuario'));

    document.addEventListener('DOMContentLoaded', () => {
        // Verificar si hay sesión activa.
        if (!usuario) {
            window.location.href = 'login.html';
            return;
        }

        // Personalizar la interfaz segun el usuario
        document.getElementById('nombreTiendaNav').innerText = usuario.nombreTienda || "BADENA";
        document.getElementById('userGreeting').innerText = `Hola, ${usuario.nombre}`;

        // Cargar los datos filtrados
        cargarProductosPorTienda();
    });

    async function cargarProductosPorTienda() {
        try {
            // Enviar el idTienda del login
            const response = await fetch(`http://localhost:8080/api/v1/productos/tienda/${usuario.idTienda}`);
            
            if (response.ok) {
                const productos = await response.json();
                renderizarProductos(productos);
            } else {
                throw new Error("No se pudieron cargar los productos");
            }
        } catch (error) {
            console.error(error);
            document.getElementById('contenedorProductos').innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                    <p class="mt-3">Aún no tienes productos registrados para esta tienda.</p>
                </div>`;
        }
    }

    function renderizarProductos(productos) {
        const contenedor = document.getElementById('contenedorProductos');
        contenedor.innerHTML = '';

        if (productos.length === 0) {
            contenedor.innerHTML = '<div class="col-12 text-center text-muted">No hay productos en el catálogo.</div>';
            return;
        }

        productos.forEach(p => {
            contenedor.innerHTML += `
                <div class="col-md-4 col-lg-3">
                    <div class="card card-producto shadow-sm h-100">
                        <img src="${p.imagenes[0]?.urlImagen ? 'http://localhost:8080' + p.imagenes[0].urlImagen : 'https://via.placeholder.com/50'}"
                            class="rounded me-2" style="width: 80px; height: 80px; object-fit: cover;">
                        <div class="card-body d-flex flex-column">
                            <span class="fw-bold">${p.nombreProducto}</span>
                            <p class="text-muted small flex-grow-1">${p.codigoUniversal || ''}</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <td><span class="badge bg-light text-dark border">${p.marca?.nombre || 'N/A'}</span></td>
                                <td><span class="badge bg-light text-dark border">${p.categoria?.nombre || 'N/A'}</span></td>
                                <div>
                                     <button class="btn btn-sm btn-outline-primary" onclick="editar('${p.codigoUniversal}')">
                                        <i class="bi bi-pencil-square"></i> Editar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
