<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Badena Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card-registration { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-icon { color: #6c757d; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-registration p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Crear Cuenta</h2>
                    <p class="text-muted">Únete a nuestra plataforma hoy mismo</p>
                </div>

                <form id="registroForm">
                    <div class="mb-3">
                        <label class="form-label"><i class="fa fa-user form-icon me-2"></i>Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><i class="fa fa-envelope form-icon me-2"></i>Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" placeholder="nombre@correo.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><i class="fa fa-lock form-icon me-2"></i>Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="fa fa-users-cog form-icon me-2"></i>Tipo de Usuario</label>
                        <select class="form-select" id="tipo" onchange="toggleTiendaFields()" required>
                            <option value="MARKET">Comprador (Market)</option>
                        </select>
                    </div>

                    <div id="seccionTienda" class="p-3 mb-4 bg-light border rounded" style="display: none;">
                        <h5 class="mb-3 text-primary"><i class="fa fa-store me-2"></i>Configuración de tu Tienda</h5>
                        <div class="mb-3">
                            <label class="form-label">Nombre Público de la Tienda</label>
                            <input type="text" class="form-control" id="nombreTienda" placeholder="Mi Tienda Tech">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL de la Tienda (Slug)</label>
                            <div class="input-group">
                                <span class="input-group-text">badena.com/</span>
                                <input type="text" class="form-control" id="slugTienda" placeholder="mi-tienda">
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Registrarme Ahora</button>
                    </div>

                    <div class="text-center mt-3">
                        <span>¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none">Inicia Sesión</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Mostrar o ocultar los campos de tienda
    function toggleTiendaFields() {
        const tipo = document.getElementById('tipo').value;
        const seccionTienda = document.getElementById('seccionTienda');
        seccionTienda.style.display = (tipo === 'CORPORATION') ? 'block' : 'none';
        
        // Hacer campos requeridos si es corporation
        document.getElementById('nombreTienda').required = (tipo === 'CORPORATION');
        document.getElementById('slugTienda').required = (tipo === 'CORPORATION');
    }

    // Enviar datos al Backend
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const datos = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            tipo: document.getElementById('tipo').value,
            nombreTienda: document.getElementById('nombreTienda').value || null,
            slugTienda: document.getElementById('slugTienda').value || null
        };

        try {
            const respuesta = await fetch('http://localhost:8080/api/auth/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (respuesta.ok) {
                alert("¡Registro exitoso!");
                window.location.href = "login.html";
            } else {
                const error = await respuesta.json();
                alert("Error: " + (error.error || "Fallo en el registro"));
            }
        } catch (error) {
            alert("No se pudo conectar con el servidor.");
        }
    });
</script>

</body>
</html>
