<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Inventario - Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<!-- Navbar Centralizado -->
<!-- Navbar modo DASHBOARD (Oculta buscador, muestra nombre en el centro) -->
<div id="navbar-placeholder" data-tipo="dashboard"></div>
<script src="js/navbar-loader.js"></script>

<div class="container mb-5 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Gestión de Inventario</h2>
            <p class="text-muted" id="nombreTiendaSub"></p>
        </div>
        <a href="add_product.html" class="btn btn-warning fw-bold"><i class="bi bi-plus-lg me-1"></i>Nuevo Producto</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-dark text-white">
                        <tr>
                            <th class="ps-3">Producto</th>
                            <th>EAN / Código</th>
                            <th>Categoría</th>
                            <th>Marca</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const usuarioActivo = JSON.parse(localStorage.getItem('usuario'));

    document.addEventListener('DOMContentLoaded', async () => {
        // Validamos que el usuario esté autenticado y sea de tipo corporativo o publisher
        if (!usuarioActivo || (usuarioActivo.tipoUsuario !== 'CORPORATION' && usuarioActivo.tipoUsuario !== 'PUBLISHER')) {
            window.location.href = 'login.html';
            return;
        }

        // EXTRACCIÓN ROBUSTA DEL ID DE TIENDA
        // Garantiza que capture el idTienda, tiendaId, o el id del objeto tienda anidado
        const idTiendaSeguro = usuarioActivo.idTienda || usuarioActivo.tiendaId || (usuarioActivo.tienda ? usuarioActivo.tienda.id : null);
        const nombreTiendaSeguro = usuarioActivo.nombreTienda || (usuarioActivo.tienda ? usuarioActivo.tienda.nombre : "Mi Tienda");

        if (!idTiendaSeguro) {
            console.error("El usuario activo no tiene un idTienda válido asociado en el localStorage:", usuarioActivo);
        }

        // Actualizamos el subtítulo de la página con el nombre de la tienda
        document.getElementById('nombreTiendaSub').innerText = nombreTiendaSeguro;

        try {
            await cargarCategorias();
            await cargarMarcas(idTiendaSeguro);
        } catch (error) {
            console.warn("Aviso: No se pudieron cargar categorías/marcas, pero intentaremos cargar los productos.");
        }

        cargarProductosTienda(idTiendaSeguro);
    });

    async function cargarCategorias() {
        const res = await fetch('http://localhost:8080/api/v1/categorias');
        return await res.json();
    }

    async function cargarMarcas(idTienda) {
        const res = await fetch(`http://localhost:8080/api/v1/marcas/tienda/${idTienda}`);
        return await res.json();
    }

    async function cargarProductosTienda(idTienda) {
        try {
            const res = await fetch(`http://localhost:8080/api/v1/productos/tienda/${idTienda}`);
            const productos = await res.json();
            const tabla = document.getElementById('tablaProductos');
            
            if (!res.ok || productos.length === 0) {
                tabla.innerHTML = '<tr><td colspan="5" class="text-center py-5">No hay productos registrados en esta tienda.</td></tr>';
                return;
            }

            tabla.innerHTML = productos.map(p => `
                <tr>
                    <td class="ps-3">
                        <div class="d-flex align-items-center">
                            <img src="${p.imagenes && p.imagenes[0]?.urlImagen ? 'http://localhost:8080' + p.imagenes[0].urlImagen : 'https://via.placeholder.com/50'}" 
                                 class="rounded me-2" style="width: 45px; height: 45px; object-fit: cover;">
                            <span class="fw-bold">${p.nombreProducto || p.nombre || 'Sin nombre'}</span>
                        </div>
                    </td>
                    <td><code>${p.codigoUniversal || '---'}</code></td>
                    <td><span class="badge bg-light text-dark border">${p.categoria?.nombre || p.categoria || 'N/A'}</span></td>
                    <td>${p.marca?.nombre || p.nombreMarca || p.marca || 'N/A'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary" onclick="editar('${p.codigoUniversal}')">
                            <i class="bi bi-pencil-square"></i> Editar
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error("Error al cargar la tabla de productos:", e);
            document.getElementById('tablaProductos').innerHTML = '<tr><td colspan="5" class="text-center py-5 text-danger">Error de conexión al cargar el inventario.</td></tr>';
        }
    }

    function editar(ean) {
        window.location.href = `edit_product.html?ean=${ean}`;
    }
</script>

</body>
</html>
