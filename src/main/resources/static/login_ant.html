<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; }
        .card-login { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .btn-login { background-color: #0d6efd; border-radius: 50px; padding: 12px; font-weight: 600; }
        .form-icon { color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card card-login p-4">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                        <i class="fa fa-lock fa-2x"></i>
                    </div>
                    <h2 class="fw-bold">Bienvenido</h2>
                    <p class="text-muted">Ingresa tus credenciales para continuar</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label"><i class="fa fa-envelope form-icon me-2"></i>Correo Electrónico</label>
                        <input type="email" class="form-control form-control-lg" id="email" placeholder="nombre@correo.com" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="fa fa-key form-icon me-2"></i>Contraseña</label>
                        <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-login">
                            <i class="fa fa-sign-in-alt me-2"></i>Entrar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const credenciales = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    try {
        const respuesta = await fetch('http://localhost:8080/api/v1/usuarios/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(credenciales)
        });

        if (respuesta.ok) {
            const data = await respuesta.json();
            localStorage.setItem('usuario', JSON.stringify(data));
            
            Swal.fire({
                icon: 'success',
                title: '¡Bienvenido!',
                text: `Hola ${data.nombre}`,
                showConfirmButton: false,
                timer: 1500
            }).then(() => {
                if (data.tipoUsuario === 'CORPORATION') {
                    window.location.href = "dashboard-productos.html"; 
                } else if (data.tipoUsuario === 'PUBLISHER' || usuario.tipoUsuario === 'PUBLISHER') {
                    window.location.href = "dashboard-productos.html";
                } else {
                    window.location.href = "market.html";
                }
            });
            
        } else {
            const errorData = await respuesta.json();
            Swal.fire({
                icon: 'error',
                title: 'Acceso Denegado',
                text: errorData.error || "Credenciales incorrectas."
            });
        }
    } catch (error) {
        console.error("DETALLE DEL ERROR:", error);
        Swal.fire({
            icon: 'warning',
            title: 'Error de conexión',
            text: 'No se pudo contactar con el servidor. ¿Está encendido el Backend?'
        });
    }
});
</script>

</body>
</html>
