<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .form-container { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .section-title { border-left: 4px solid #ffc107; padding-left: 10px; margin-bottom: 20px; color: #856404; }
        .img-preview-edit { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 2px solid #ddd; }
    </style>
</head>
<body>

<!-- Navbar modo DASHBOARD (Oculta buscador, muestra nombre en el centro) -->
<div id="navbar-placeholder" data-tipo="dashboard"></div>
<script src="js/navbar-loader.js"></script>

<div class="container mb-5 mt-4">
    <!-- Botón de regreso reubicado fuera del navbar -->
    <div class="mb-3">
        <a href="dashboard-productos.html" class="btn btn-outline-secondary fw-bold rounded-pill px-4 shadow-sm">
            <i class="bi bi-arrow-left me-2"></i>Volver al Inventario
        </a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="form-container p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark">Modificar Producto</h2>
                    <span class="badge bg-warning text-dark px-3 py-2" id="eanLabel">EAN: ---</span>
                </div>

                <form id="formEditarProducto">
                    <input type="hidden" id="idProducto">

                    <h5 class="section-title fw-bold">Información General</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Nombre del Producto</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Categoría</label>
                            <select id="idCategoria" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Marca</label>
                            <select id="idMarca" class="form-select" required></select>
                        </div>
                    </div>

                    <h5 class="section-title fw-bold">Especificaciones</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Contenido Neto</label>
                            <input type="text" id="contenidoNeto" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Unidad</label>
                            <select id="unidadMedida" class="form-select">
                                <option value="g">Gramos (g)</option>
                                <option value="kg">Kilogramos (kg)</option>
                                <option value="ml">Mililitros (ml)</option>
                                <option value="lt">Litros (lt)</option>
                                <option value="un">Unidades (un)</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">EAN (No editable)</label>
                            <input type="text" id="codigoUniversal" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">SKU</label>
                            <input type="text" id="skuVendedor" class="form-control">
                        </div>
                    </div>

                    <h5 class="section-title fw-bold">Dimensiones (Logística)</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Peso (Kg)</label>
                            <input type="number" step="0.01" id="pesoKg" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Largo (cm)</label>
                            <input type="number" step="0.1" id="largoCm" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Ancho (cm)</label>
                            <input type="number" step="0.1" id="anchoCm" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Alto (cm)</label>
                            <input type="number" step="0.1" id="altoCm" class="form-control">
                        </div>
                    </div>

                    <h5 class="section-title fw-bold">Contenido Multimedia</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label class="form-label fw-bold">Descripción Comercial</label>
                            <textarea id="descripcionMarketing" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Ficha Técnica</label>
                            <textarea id="descripcionTecnica" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Añadir/Reemplazar Imágenes</label>
                            <input type="file" id="fotos" class="form-control" multiple accept="image/*">
                            <div id="fotosActuales" class="mt-3 d-flex gap-2"></div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark btn-lg fw-bold rounded-pill">
                            <i class="bi bi-check-circle-fill me-2"></i>Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const usuarioActivo = JSON.parse(localStorage.getItem('usuario'));
    const urlParams = new URLSearchParams(window.location.search);
    const eanUrl = urlParams.get('ean');

    document.addEventListener('DOMContentLoaded', async () => {
        if (!usuarioActivo || (usuarioActivo.tipoUsuario !== 'CORPORATION' && usuarioActivo.tipoUsuario !== 'PUBLISHER')) {
            console.error("Acceso denegado: Rol no permitido");
            window.location.href = 'login.html';
            return;
        }
        
        // Se ha eliminado la llamada fallida a cargarMenu() que rompía el script
        await Promise.all([cargarCategorias(), cargarMarcas()]);
        cargarDatosProducto();
    });

    async function cargarDatosProducto() {
        try {
            const res = await fetch(`http://localhost:8080/api/v1/productos/${eanUrl}`);
            const p = await res.json();

            document.getElementById('idProducto').value = p.id;
            document.getElementById('eanLabel').innerText = `EAN: ${p.codigoUniversal}`;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('codigoUniversal').value = p.codigoUniversal;
            document.getElementById('skuVendedor').value = p.skuVendedor || '';
            document.getElementById('descripcionMarketing').value = p.descripcionMarketing || '';
            document.getElementById('descripcionTecnica').value = p.descripcionTecnica || '';
            document.getElementById('contenidoNeto').value = p.contenidoNeto || '';
            document.getElementById('unidadMedida').value = p.unidadMedida || 'un';
            document.getElementById('pesoKg').value = p.pesoKg || 0;
            document.getElementById('largoCm').value = p.largoCm || 0;
            document.getElementById('anchoCm').value = p.anchoCm || 0;
            document.getElementById('altoCm').value = p.altoCm || 0;

            seleccionarOpcionPorTexto('idCategoria', p.categoria);
            seleccionarOpcionPorTexto('idMarca', p.nombreMarca);

            const divFotos = document.getElementById('fotosActuales');
            divFotos.innerHTML = p.imagenes.map(img => `
                <img src="http://localhost:8080${img.urlImagen}" class="img-preview-edit shadow-sm">
            `).join('');

        } catch (e) { console.error("Error cargando producto:", e); }
    }

    function seleccionarOpcionPorTexto(idSelect, texto) {
        const select = document.getElementById(idSelect);
        if (!texto) return;
        
        for(let opt of select.options) {
            const textoLimpio = opt.text.replace('└ ', '').trim();
            if(textoLimpio === texto.trim()) {
                opt.selected = true;
                break;
            }
        }
    }

    async function cargarCategorias() {
        try {
            const res = await fetch('http://localhost:8080/api/v1/categorias');
            const data = await res.json();
            const select = document.getElementById('idCategoria');
            select.innerHTML = '<option value="">Seleccionar...</option>';
            select.innerHTML += construirArbolOpciones(data, 0);
        } catch (e) { console.error("Error categorías:", e); }
    }

    function construirArbolOpciones(categorias, nivel) {
        let html = '';
        const sangria = '&nbsp;&nbsp;&nbsp;&nbsp;'.repeat(nivel);
        const rama = nivel > 0 ? '└ ' : '';

        categorias.forEach(cat => {
            html += `<option value="${cat.id}">${sangria}${rama}${cat.nombre}</option>`;
            if (cat.subcategorias && cat.subcategorias.length > 0) {
                html += construirArbolOpciones(cat.subcategorias, nivel + 1);
            }
        });
        
        return html;
    }

    async function cargarMarcas() {
        const res = await fetch(`http://localhost:8080/api/v1/marcas/tienda/${usuarioActivo.idTienda}`);
        const data = await res.json();
        const select = document.getElementById('idMarca');
        select.innerHTML = '<option value="">Seleccionar...</option>';
        data.forEach(m => select.innerHTML += `<option value="${m.id}">${m.nombre}</option>`);
    }

    document.getElementById('formEditarProducto').addEventListener('submit', (e) => {
        e.preventDefault();
        Swal.fire({
            title: '¿Guardar cambios?',
            text: "Se actualizará la información técnica del producto.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Sí, actualizar',
            confirmButtonColor: '#212529'
        }).then((result) => {
            if (result.isConfirmed) {
                enviarActualizacion();
            }
        });
    });

    async function enviarActualizacion() {
        const formData = new FormData();
        const tiendaId = usuarioActivo ? usuarioActivo.idTienda : null;

        if (!tiendaId) {
            Swal.fire('Error', 'No se pudo identificar la sesión de la tienda.', 'error');
            return;
        }

        const prodJson = {
            id: parseInt(document.getElementById('idProducto').value),
            nombre: document.getElementById('nombre').value,
            idMarca: parseInt(document.getElementById('idMarca').value),
            idCategoria: parseInt(document.getElementById('idCategoria').value),
            skuVendedor: document.getElementById('skuVendedor').value,
            codigoUniversal: document.getElementById('codigoUniversal').value,
            descripcionMarketing: document.getElementById('descripcionMarketing').value,
            descripcionTecnica: document.getElementById('descripcionTecnica').value,
            contenidoNeto: document.getElementById('contenidoNeto').value,
            unidadMedida: document.getElementById('unidadMedida').value,
            pesoKg: parseFloat(document.getElementById('pesoKg').value) || 0,
            largoCm: parseFloat(document.getElementById('largoCm').value) || 0,
            anchoCm: parseFloat(document.getElementById('anchoCm').value) || 0,
            altoCm: parseFloat(document.getElementById('altoCm').value) || 0,
            idTienda: parseInt(tiendaId) 
        };

        formData.append("producto", new Blob([JSON.stringify(prodJson)], { type: "application/json" }));
        
        const fotos = document.getElementById('fotos').files;
        for (let i = 0; i < Math.min(fotos.length, 5); i++) {
            formData.append("imagenes", fotos[i]);
        }

        try {
            const res = await fetch(`http://localhost:8080/api/v1/productos/actualizar`, {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                Swal.fire('¡Actualizado!', 'Los datos se guardaron correctamente.', 'success')
                    .then(() => window.location.href = 'dashboard-productos.html');
            } else {
                const errorData = await res.json();
                Swal.fire('Error', errorData.error || 'No se pudo actualizar el producto.', 'error');
            }
        } catch (e) {
            Swal.fire('Error de red', 'El servidor no responde.', 'error');
        }
    }
</script>

</body>
</html>
