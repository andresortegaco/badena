<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        .card-img-wrapper {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            padding: 15px;
            border-radius: 5px;
        }
        .card-img-top {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        .product-card {
            transition: transform 0.2s;
            border: none;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .navbar-dark .nav-link {
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
            <i class="bi bi-journal-bookmark-fill me-2"></i>Badena
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <form class="d-flex mx-auto w-50 my-2 my-lg-0">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="inputBuscador" class="form-control" placeholder="Buscar por nombre o código de barras ...">
                    <button class="btn btn-dark" type="button">Buscar</button>
                </div>
            </form>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2" id="menuUsuario">
            </ul>
        </div>
    </div>
</nav>


<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <div>
            <h4 class="mb-0 text-dark fw-bold">Explorar Productos</h4>
            <small class="text-muted">Encuentra especificaciones técnicas oficiales</small>
        </div>
        <div>
            <select class="form-select form-select-sm shadow-sm">
                <option selected>Más Recientes</option>
                <option>Orden Alfabético (A-Z)</option>
                <option>Por Marca</option>
            </select>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="contenedorProductos">
        <div class="col-12 text-center mt-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="text-muted mt-2">Sincronizando catálogo...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 

<script>
    document.addEventListener("DOMContentLoaded", function() {
        actualizarMenuUsuario();
        cargarCatalogo();
    });

    function actualizarMenuUsuario() {
        const usuarioJson = localStorage.getItem('usuario');
        const menuUsuario = document.getElementById('menuUsuario');
        
        if (usuarioJson) {
            const usuario = JSON.parse(usuarioJson);

            const nombreDisp = usuario.nombre || "Usuario";
            const tipoDisp = usuario.tipoUsuario || "MARKET";
            const tiendaDisp = usuario.nombreTienda || "Mi Tienda";
            const esCorporacion = tipoDisp === 'CORPORATION';
            const esPublicador = tipoDisp === 'PUBLISHER';

            let html = '';

            if (esCorporacion) {
                html += `
                <li class="nav-item">
                    <a class="btn btn-warning btn-sm me-3 fw-bold shadow-sm rounded-pill px-3" href="add_product.html">
                        <i class="bi bi-plus-circle-fill me-1"></i>Publicar
                    </a>
                </li>`;
            }

            html += `
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle text-white d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                    <div class="text-end me-2 d-none d-sm-block" style="line-height: 1.2;">
                        <div class="fw-bold" style="font-size: 0.9rem;">${nombreDisp}</div>
                        <small class="opacity-75" style="font-size: 0.75rem;">${tipoDisp}</small>
                    </div>
                    <i class="bi bi-person-circle fs-3"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
                    ${esPublicador || esCorporacion ? `
                        <li><h6 class="dropdown-header text-primary"><i class="bi bi-shop me-2"></i>${tiendaDisp}</h6></li>
                        <li><a class="dropdown-item" href="dashboard-productos.html"><i class="bi bi-grid-3x3-gap me-2"></i>Mi Inventario</a></li>
                        <li><a class="dropdown-item" href="add_product.html"><i class="bi bi-plus-square me-2"></i>Agregar Producto</a></li>
                        <li><hr class="dropdown-divider"></li>
                    ` : ''}
                    <li><a class="dropdown-item" href="/perfil.html"><i class="bi bi-person-vcard me-2"></i>Mi Perfil..</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger fw-bold" href="#" onclick="logout()">
                            <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </li>`;

            menuUsuario.innerHTML = html;
        } else {
            menuUsuario.innerHTML = `
                <li class="nav-item">
                    <a class="nav-link text-white fw-medium" href="login.html">Iniciar Sesión</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill" href="registro.html">Crear Cuenta</a>
                </li>`;
        }
    }

    function logout() {
        localStorage.removeItem('usuario');
        window.location.reload();
    }

    function cargarCatalogo() {
        fetch('http://localhost:8080/api/v1/productos')
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(productos => {
                const contenedor = document.getElementById('contenedorProductos');
                if (productos.length === 0) {
                    contenedor.innerHTML = `<div class="col-12 text-center py-5 text-muted"><h4>Catálogo vacío</h4></div>`;
                    return;
                }

                let html = '';
                productos.forEach(prod => {
                    let urlImagen = prod.imagenes?.length > 0 
                        ? 'http://localhost:8080' + prod.imagenes[0].urlImagen 
                        : 'https://via.placeholder.com/300?text=Sin+Imagen';

                    html += `
                    <div class="col">
                        <div class="card h-100 shadow-sm product-card">
                            <div class="card-img-wrapper">
                                <img src="${urlImagen}" class="card-img-top" onerror="this.src='https://via.placeholder.com/300'">
                            </div>
                            <div class="card-body d-flex flex-column">
                                <div class="mb-2">
                                    <span class="badge bg-light text-dark border">${prod.categoria?.nombre || 'General'}</span>
                                    <small class="text-primary fw-bold ms-1">${prod.marca?.nombre || 'Genérico'}</small>
                                </div>
                                <h6 class="card-title fw-bold text-truncate">${prod.nombreProducto}</h6>
                                <p class="card-text text-muted small text-truncate">${prod.descripcionMarketing || 'Sin descripción'}</p>
                                <div class="mt-auto">
                                    <button class="btn btn-outline-primary w-100 btn-sm fw-bold" onclick="verDetalle('${prod.codigoUniversal}')">
                                        <i class="bi bi-file-earmark-text me-1"></i>Ver Detalles
                                    </button>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-0 text-muted small">
                                EAN ${prod.codigoUniversal || 'N/A'}
                            </div>
                        </div>
                    </div>`;
                });
                contenedor.innerHTML = html;
            })
            .catch(() => {
                document.getElementById('contenedorProductos').innerHTML = `<div class="col-12 text-center py-5 text-danger">Error de conexión al cargar catálogo</div>`;
            });
    }

    function verDetalle(codigo) {
        window.location.href = `product.html?cod=${codigo}`;
    }

    const buscador = document.getElementById('inputBuscador');

    buscador.addEventListener('input', (e) => {
        const termino = e.target.value.trim();

        if (termino.length >= 3) {
            ejecutarBusqueda(termino);
        } else if (termino.length === 0) {
            cargarCatalogo();
        }
    });

    async function ejecutarBusqueda(query) {
        try {
            const res = await fetch(`http://localhost:8080/api/v1/productos/buscar?q=${query}`);
            const productos = await res.json();
            renderizarProductos(productos); 
        } catch (error) {
            console.error("Error en la búsqueda:", error);
        }
    }

    function renderizarProductos(lista) {
        const contenedor = document.getElementById('contenedorProductos');
        if (lista.length === 0) {
            contenedor.innerHTML = '<div class="col-12 text-center py-5"><h5>No se encontraron coincidencias.</h5></div>';
            return;
        }

        contenedor.innerHTML = lista.map(p => `
            <div class="col-md-3 mb-4">
                <div class="card h-100 shadow-sm border-0 product-card">
                    <img src="${p.imagenes?.[0]?.urlImagen ? 'http://localhost:8080' + p.imagenes[0].urlImagen : 'https://via.placeholder.com/150'}" 
                         class="card-img-top p-3" style="height: 200px; object-fit: contain;">
                    <div class="card-body">
                        <div class="mb-2">
                            <span class="badge bg-light text-dark border">${p.categoria?.nombre || p.categoria || 'Sin Categoría'}</span>
                        </div>
                        <h6 class="card-title fw-bold">${p.nombreProducto || p.nombre}</h6>
                        <p class="text-muted small mb-3">${p.marca?.nombre || p.nombreMarca || 'Marca Genérica'}</p>
                        
                        <button class="btn btn-primary btn-sm w-100 rounded-pill" 
                                onclick="verDetalle('${p.codigoUniversal || p.id}')">
                            <i class="bi bi-eye-fill me-1"></i> Ver Detalles
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
