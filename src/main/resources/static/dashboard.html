<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css"> </head>
<body>

    <div class="d-flex">
        <div id="sidebar-container"></div>

        <main class="flex-grow-1 p-4 bg-light">
            <header class="mb-4">
                <h2 class="fw-bold">Panel de Control</h2>
                <p class="text-muted" id="welcomeMessage">Bienvenido a la gestión de tu tienda</p>
            </header>

            <div class="row g-4">
                <div class="col-md-6 col-lg-4">
                    <div class="card border-0 shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-primary text-white rounded-3 p-3 me-3">
                                <i class="bi bi-box-seam fs-3"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-0">Productos Creados</h6>
                                <h3 class="fw-bold mb-0" id="statProductos">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4">
                    <div class="card border-0 shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-success text-white rounded-3 p-3 me-3">
                                <i class="bi bi-people fs-3"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-0">Publicadores Activos</h6>
                                <h3 class="fw-bold mb-0" id="statUsuarios">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/menu.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sesion = JSON.parse(localStorage.getItem('sesionBadena'));
            if(sesion) {
                cargarEstadisticas(sesion.idTienda);
                document.getElementById('welcomeMessage').innerText = `Gestionando: ${sesion.nombreTienda || 'Tu Tienda'}`;
            }
        });

        function cargarEstadisticas(idTienda) {
            fetch(`http://localhost:8080/api/v1/productos/stats/${idTienda}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('statProductos').innerText = data.totalProductos;
                    document.getElementById('statUsuarios').innerText = data.totalPublicadores;
                })
                .catch(err => console.error("Error al cargar stats", err));
        }
    </script>
</body>
</html>
