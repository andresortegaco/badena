<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Badena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .profile-header { background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%); color: white; border-radius: 15px; }
        .info-card { border: none; border-radius: 12px; transition: 0.3s; }
        .info-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-light">

<!-- Navbar modo DASHBOARD (Oculta buscador, muestra nombre en el centro) -->
<div id="navbar-placeholder" data-tipo="dashboard"></div>
<script src="js/navbar-loader.js"></script>

<div class="container mb-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="profile-header p-5 mb-4 text-center shadow">
                <i class="bi bi-person-circle display-1"></i>
                <h2 class="mt-3 fw-bold" id="userName">Cargando...</h2>
                <span class="badge rounded-pill bg-warning text-dark px-3 py-2 fw-bold" id="userRole">---</span>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card info-card p-4 shadow-sm h-100">
                        <h6 class="text-muted text-uppercase small fw-bold"><i class="bi bi-shield-lock me-2"></i>Seguridad</h6>
                        <p class="mb-1 mt-2"><b>Usuario:</b> <span id="displayUser">---</span></p>
                        <p class="mb-0"><b>Estado:</b> <span class="text-success">Activo</span></p>
                    </div>
                </div>

                <div class="col-md-6" id="cardTienda" style="display: none;">
                    <div class="card info-card p-4 shadow-sm h-100">
                        <h6 class="text-muted text-uppercase small fw-bold"><i class="bi bi-shop me-2"></i>Empresa</h6>
                        <p class="mb-1 mt-2" id="displayTienda">---</p>
                        <small class="text-primary">Tienda Vinculada</small>
                    </div>
                </div>

                <div class="col-12 mt-4">
                    <div id="btnAdminContainer" style="display: none;" class="text-center">
                        <a href="edit_perfil.html" class="btn btn-primary btn-lg px-5 rounded-pill shadow fw-bold">
                            <i class="bi bi-gear-fill me-2"></i>Gestionar Empresa y Equipo
                        </a>
                    </div>

                    <div id="formPublisherContainer" style="display: none;" class="card info-card p-4 shadow-sm border-warning">
                        <h5 class="fw-bold"><i class="bi bi-key me-2 text-warning"></i>Actualizar Mi Contraseña</h5>
                        <hr>
                        <div class="input-group">
                            <input type="password" id="nuevaPass" class="form-control" placeholder="Escribe tu nueva clave aquí">
                            <button class="btn btn-warning fw-bold" onclick="actualizarClave()">Actualizar</button>
                        </div>
                        <small class="text-muted mt-2 d-block">Por seguridad, usa una clave que no uses en otros sitios.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ESTE SCRIPT ES OBLIGATORIO PARA QUE FUNCIONE EL MENÚ DESPLEGABLE -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const usuario = JSON.parse(localStorage.getItem('usuario'));

    document.addEventListener("DOMContentLoaded", () => {
        if (!usuario) { window.location.href = 'login.html'; return; }

        // Datos del usuario (el navbar ya maneja tiendaCentral de forma global)
        document.getElementById('userName').innerText = usuario.nombre;
        document.getElementById('displayUser').innerText = usuario.nombreUsuario;
        document.getElementById('userRole').innerText = usuario.tipoUsuario;

        if (usuario.tipoUsuario === 'CORPORATION' || usuario.tipoUsuario === 'PUBLISHER') {
            document.getElementById('cardTienda').style.display = 'block';
            document.getElementById('displayTienda').innerText = usuario.nombreTienda;
        }

        // permisos segun tipo de usuario
        if (usuario.tipoUsuario === 'CORPORATION') {
            document.getElementById('btnAdminContainer').style.display = 'block';
        } else if (usuario.tipoUsuario === 'PUBLISHER') {
            document.getElementById('formPublisherContainer').style.display = 'block';
        }
    });

    async function actualizarClave() {
        const pass = document.getElementById('nuevaPass').value;
        if (!pass || pass.length < 4) {
            Swal.fire('Error', 'La clave es muy corta', 'error');
            return;
        }

        try {
            const res = await fetch('http://localhost:8080/api/v1/usuarios/update-pass', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: usuario.id, password: pass })
            });

            if (res.ok) {
                Swal.fire('¡Éxito!', 'Contraseña actualizada correctamente', 'success');
                document.getElementById('nuevaPass').value = '';
            }
        } catch (e) {
            Swal.fire('Error', 'No se pudo conectar con el servidor', 'error');
        }
    }
</script>
</body>
</html>
